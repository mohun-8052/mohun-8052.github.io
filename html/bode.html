<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Bode Professional v1.0</title>
    <style>
        :root { --bg: #f5f7f9; --panel: #ffffff; --primary: #1976D2; --axis: #333; --grid: #e8e8e8; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        #sidebar { width: 360px; min-width: 360px; background: var(--panel); border-right: 1px solid #cfd8dc; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; box-shadow: 2px 0 12px rgba(0,0,0,0.08); }
        .section { padding: 12px; border: 1px solid #e0e6ed; border-radius: 8px; background: #fff; }
        h3 { font-size: 0.85rem; margin: 0 0 10px 0; color: var(--primary); border-left: 4px solid var(--primary); padding-left: 8px; text-transform: uppercase; }
        
        label { display: block; font-size: 11px; color: #546e7a; margin-bottom: 2px; font-weight: 700; }
        input, select { width: 100%; padding: 5px; border: 1px solid #b0bec5; border-radius: 4px; box-sizing: border-box; font-family: 'Consolas', monospace; margin-bottom: 5px; font-size: 12px; }
        
        #main { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; gap: 15px; background: #eceff1; overflow-y: auto; align-items: center; }
        .chart-container { width: 100%; max-width: 1100px; background: #fff; border: 1px solid #cfd8dc; border-radius: 4px; position: relative; }
        canvas { display: block; width: 100%; height: 320px; }
        .tag { position: absolute; top: 10px; left: 85px; font-size: 10px; font-weight: 800; color: #fff; background: #455a64; padding: 2px 6px; border-radius: 3px; z-index: 5; }
        
        #dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; background: #263238; color: #fff; border-radius: 8px; }
        .val { color: #64ffda; font-weight: 800; display: block; font-size: 18px; }
        
        .item-row { display: grid; grid-template-columns: 1fr 85px 45px 25px 20px; gap: 4px; margin-bottom: 8px; align-items: center; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .q-input { grid-column: 1 / span 2; margin-top: 2px; display: flex; align-items: center; gap: 5px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; font-size: 11px; margin-top: 5px;}
        input[type="color"] { padding: 0; height: 24px; border: none; cursor: pointer; background: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="dashboard">
        <div>UGF<span id="ugf-val" class="val">--</span></div>
        <div>PM<span id="pm-val" class="val">--</span></div>
    </div>

    <div class="section">
        <h3>1. 系统参数 (System)</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <div>
                <label>Gain (dB)</label>
                <input type="text" id="dc-gain" value="60" onchange="updateSys()">
            </div>
            <div>
                <label>Phase Start (°)</label>
                <input type="number" id="phase-start" value="180" onchange="render()">
            </div>
        </div>
        
        <label>极点 Poles (X)</label>
        <div id="poles-list"></div>
        <button class="btn-add" onclick="addItem('pole')">+ 增加极点</button>
        
        <label style="margin-top:12px;">零点 Zeros (O)</label>
        <div id="zeros-list"></div>
        <button class="btn-add" onclick="addItem('zero')">+ 增加零点</button>
    </div>

    <div class="section">
        <h3>2. 视图与缩放 (Log Axis)</h3>
        <label>中心频率 Pan (10^x Hz)</label>
        <input type="range" id="freq-pan" min="-6" max="12" step="0.1" value="3" oninput="updateView()">
        <label>显示跨度 Zoom (Decades)</label>
        <input type="range" id="freq-zoom" min="1" max="18" step="0.1" value="9" oninput="updateView()">
        
        <label>纵轴范围 (dB / Deg)</label>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:4px;">
            <input type="number" id="mag-min" value="-40" onchange="render()">
            <input type="number" id="mag-max" value="80" onchange="render()">
            <input type="number" id="phase-min" value="-90" onchange="render()">
            <input type="number" id="phase-max" value="270" onchange="render()">
        </div>
    </div>
</div>

<div id="main">
    <div class="chart-container">
        <div class="tag">MAGNITUDE RESPONSE</div>
        <canvas id="magCanvas"></canvas>
    </div>
    <div class="chart-container">
        <div class="tag">PHASE RESPONSE</div>
        <canvas id="phaseCanvas"></canvas>
    </div>
</div>

<script>
    const UNITS = { 'G': 1e9, 'M': 1e6, 'k': 1e3, 'm': 1e-3, 'u': 1e-6, 'n': 1e-9, 'p': 1e-12 };
    const PAD = { t: 40, r: 40, b: 50, l: 85 }; 
    const COLORS = { axis: '#333', grid: '#e8e8e8', ugf: '#D32F2F' };

    let sys = { 
        dc: 60, 
        poles: [{f: 1000, t: 'LHP', c: '#D32F2F', q: 0.707}], 
        zeros: [{f: 1e5, t: 'LHP', c: '#2E7D32'}] 
    };
    let view = { fMin: 0.001, fMax: 1e9 };

    const mCanvas = document.getElementById('magCanvas'), pCanvas = document.getElementById('phaseCanvas');
    const mCtx = mCanvas.getContext('2d'), pCtx = pCanvas.getContext('2d');

    function init() {
        window.addEventListener('resize', onResize);
        setupEvents();
        updateView();
        syncUI();
        setTimeout(onResize, 50);
    }

    function onResize() {
        const containerWidth = mCanvas.parentElement.clientWidth;
        const fixedHeight = 320;
        [mCanvas, pCanvas].forEach(c => {
            c.width = containerWidth * window.devicePixelRatio;
            c.height = fixedHeight * window.devicePixelRatio;
            c.style.height = fixedHeight + "px";
        });
        render();
    }

    // --- 核心数学逻辑 ---
    function getResp(f) {
        let m = sys.dc;
        let p = parseFloat(document.getElementById('phase-start').value) || 0; 
        
        const processItem = (item, isPole) => {
            const sign = isPole ? -1 : 1;
            if (item.t === 'Conjugate') {
                const ratio = f / item.f;
                const magFactor = Math.sqrt(Math.pow(1 - ratio*ratio, 2) + Math.pow(ratio/item.q, 2));
                m += sign * 20 * Math.log10(magFactor || 1e-15);
                let phs = Math.atan2(ratio/item.q, 1 - ratio*ratio) * 180 / Math.PI;
                p += sign * phs;
            } else {
                m += sign * 20 * Math.log10(Math.sqrt(1 + (f/item.f)**2));
                let d = Math.atan2(f, item.f) * 180 / Math.PI;
                p += sign * (item.t === 'LHP' ? d : -d);
            }
        };
        sys.poles.forEach(x => processItem(x, true));
        sys.zeros.forEach(x => processItem(x, false));
        return { m, p };
    }

    function render() {
        const dpr = window.devicePixelRatio || 1;
        const w = mCanvas.width / dpr, h = mCanvas.height / dpr;
        const mRange = { min: parseFloat(document.getElementById('mag-min').value), max: parseFloat(document.getElementById('mag-max').value) };
        const pRange = { min: parseFloat(document.getElementById('phase-min').value), max: parseFloat(document.getElementById('phase-max').value) };

        [mCtx, pCtx].forEach(ctx => {
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, w, h);
            drawGrid(ctx, w, h, ctx === mCtx ? mRange : pRange, ctx === mCtx ? 'dB' : '°');
        });

        let ugf = null, pm = null;
        mCtx.beginPath(); pCtx.beginPath();
        mCtx.strokeStyle = "#1976D2"; pCtx.strokeStyle = "#E65100";
        mCtx.lineWidth = 2.5; pCtx.lineWidth = 2.5;

        for (let x = PAD.l; x <= w - PAD.r; x++) {
            const f = xToFreq(x, w);
            const { m, p } = getResp(f);
            const my = valToY(m, mRange.min, mRange.max, h);
            const py = valToY(p, pRange.min, pRange.max, h);
            if (x === PAD.l) { mCtx.moveTo(x, my); pCtx.moveTo(x, py); }
            else { mCtx.lineTo(x, my); pCtx.lineTo(x, py); }
            if (!ugf && m <= 0) { ugf = f; pm = p; }
        }
        mCtx.stroke(); pCtx.stroke();

        if (ugf && ugf >= view.fMin && ugf <= view.fMax) {
            const ux = freqToX(ugf, w);
            [mCtx, pCtx].forEach(ctx => {
                ctx.save(); ctx.setLineDash([5, 3]); ctx.strokeStyle = COLORS.ugf;
                ctx.beginPath(); ctx.moveTo(ux, PAD.t); ctx.lineTo(ux, h-PAD.b); ctx.stroke(); ctx.restore();
            });
            mCtx.fillStyle = COLORS.ugf; mCtx.font = "bold 11px Arial";
            mCtx.fillText(`UGF: ${formatEng(ugf)}Hz`, ux + 5, PAD.t + 15);
        }

        [...sys.poles.map(p=>({p, isP:true})), ...sys.zeros.map(z=>({p:z, isP:false}))].forEach(obj => {
            drawMarker(mCtx, obj.p, obj.isP, mRange, w, h);
        });

        document.getElementById('ugf-val').innerText = ugf ? formatEng(ugf) + 'Hz' : '--';
        document.getElementById('pm-val').innerText = pm ? pm.toFixed(1) + '°' : '--';
    }

    function drawGrid(ctx, w, h, range, unit) {
        ctx.strokeStyle = COLORS.grid; ctx.lineWidth = 1;
        const lMin = Math.floor(Math.log10(view.fMin)), lMax = Math.ceil(Math.log10(view.fMax));
        
        for (let i = lMin; i <= lMax; i++) {
            let x = freqToX(Math.pow(10, i), w);
            if (x < PAD.l || x > w - PAD.r) continue;
            ctx.beginPath(); ctx.moveTo(x, PAD.t); ctx.lineTo(x, h - PAD.b); ctx.stroke();
            
            // 绘制副刻度
            ctx.save(); ctx.globalAlpha = 0.3;
            for(let j=2; j<10; j++) {
                let sx = freqToX(Math.pow(10, i) * j, w);
                if(sx >= PAD.l && sx <= w-PAD.r) {
                    ctx.beginPath(); ctx.moveTo(sx, PAD.t); ctx.lineTo(sx, h-PAD.b); ctx.stroke();
                }
            }
            ctx.restore();
        }
        
        ctx.strokeStyle = COLORS.axis; ctx.lineWidth = 2;
        ctx.strokeRect(PAD.l, PAD.t, w - PAD.l - PAD.r, h - PAD.t - PAD.b);
        ctx.fillStyle = COLORS.axis; ctx.font = "bold 11px 'Consolas'";
        
        for (let i = lMin; i <= lMax; i++) {
            let f = Math.pow(10, i);
            let x = freqToX(f, w);
            if (x >= PAD.l - 10 && x <= w - PAD.r + 10) {
                ctx.fillText(formatEng(f), x - 18, h - PAD.b + 22);
            }
        }
        for (let i = 0; i <= 6; i++) {
            const val = range.min + (range.max - range.min) * (i / 6);
            const y = valToY(val, range.min, range.max, h);
            ctx.fillText(val.toFixed(0) + unit, PAD.l - 65, y + 4);
        }
    }

    function drawMarker(ctx, item, isP, range, w, h) {
        if (item.f < view.fMin || item.f > view.fMax) return;
        const x = freqToX(item.f, w), y = valToY(getResp(item.f).m, range.min, range.max, h);
        ctx.strokeStyle = item.c; ctx.lineWidth = 3;
        ctx.beginPath();
        if (isP) { 
            ctx.moveTo(x-5, y-5); ctx.lineTo(x+5, y+5); ctx.moveTo(x-5, y+5); ctx.lineTo(x+5, y-5);
            if (item.t === 'Conjugate') ctx.strokeRect(x-8, y-8, 16, 16);
        } else { 
            ctx.arc(x, y, 5, 0, 7); 
        }
        ctx.stroke();
    }

    // --- 改进后的工程计数法转换函数 ---
    function formatEng(v) { 
        if (v === 0) return "0";
        const absV = Math.abs(v);
        if (absV >= 1e9) return (v/1e9).toFixed(absV < 1e10 ? 1 : 0) + 'G';
        if (absV >= 1e6) return (v/1e6).toFixed(absV < 1e7 ? 1 : 0) + 'M';
        if (absV >= 1e3) return (v/1e3).toFixed(absV < 1e4 ? 1 : 0) + 'k';
        if (absV >= 1) return v.toFixed(absV < 10 ? 1 : 0);
        if (absV >= 1e-3) return (v*1e3).toFixed(0) + 'm';
        if (absV >= 1e-6) return (v*1e6).toFixed(0) + 'u';
        if (absV >= 1e-9) return (v*1e9).toFixed(0) + 'n';
        if (absV >= 1e-12) return (v*1e12).toFixed(0) + 'p';
        return v.toExponential(0);
    }

    function parseEng(s) {
        const m = String(s).match(/^([0-9.]+)\s*([a-zA-Z]*)$/);
        if (!m) return parseFloat(s) || 0;
        let unitMult = UNITS[m[2]] || 1;
        return parseFloat(m[1]) * unitMult;
    }

    // --- 坐标转换逻辑 ---
    function freqToX(f, w) {
        const lMin = Math.log10(view.fMin), lMax = Math.log10(view.fMax);
        return PAD.l + (Math.log10(f) - lMin) / (lMax - lMin) * (w - PAD.l - PAD.r);
    }
    function xToFreq(x, w) {
        const lMin = Math.log10(view.fMin), lMax = Math.log10(view.fMax);
        return Math.pow(10, lMin + (x - PAD.l) / (w - PAD.l - PAD.r) * (lMax - lMin));
    }
    function valToY(v, min, max, h) { return h - PAD.b - (v - min) / (max - min) * (h - PAD.t - PAD.b); }

    // --- UI 管理 ---
    function syncUI() {
        const renderList = (type) => {
            const container = document.getElementById(type + 's-list');
            container.innerHTML = '';
            sys[type+'s'].forEach((item, i) => {
                const wrapper = document.createElement('div');
                wrapper.style.marginBottom = "10px";
                const mainRow = document.createElement('div');
                mainRow.className = 'item-row';
                mainRow.innerHTML = `
                    <input type="text" value="${formatEng(item.f)}" onchange="updateItem('${type}',${i},'f',this.value)">
                    <select onchange="updateItem('${type}',${i},'t',this.value)">
                        <option value="LHP" ${item.t==='LHP'?'selected':''}>LHP</option>
                        <option value="RHP" ${item.t==='RHP'?'selected':''}>RHP</option>
                        ${type==='pole'?'<option value="Conjugate" '+(item.t==='Conjugate'?'selected':'')+'>Conj</option>':''}
                    </select>
                    <input type="color" value="${item.c}" onchange="updateItem('${type}',${i},'c',this.value)">
                    <button style="border:none;background:none;color:red;font-weight:bold;cursor:pointer" onclick="removeItem('${type}',${i})">×</button>
                `;
                wrapper.appendChild(mainRow);
                if (item.t === 'Conjugate') {
                    const qRow = document.createElement('div');
                    qRow.className = 'q-input';
                    qRow.innerHTML = `<label>Q Factor:</label><input type="number" step="0.1" value="${item.q}" onchange="updateItem('${type}',${i},'q',this.value)">`;
                    wrapper.appendChild(qRow);
                }
                container.appendChild(wrapper);
            });
        };
        renderList('pole'); renderList('zero');
    }

    function updateView() {
        const pan = parseFloat(document.getElementById('freq-pan').value);
        const zoom = parseFloat(document.getElementById('freq-zoom').value);
        view.fMin = Math.pow(10, pan - zoom/2);
        view.fMax = Math.pow(10, pan + zoom/2);
        render();
    }
    window.addItem = (t) => { sys[t+'s'].push({f: 1e6, t:'LHP', c: t==='pole'?'#D32F2F':'#2E7D32', q: 0.707}); syncUI(); render(); };
    window.removeItem = (t, i) => { sys[t+'s'].splice(i, 1); syncUI(); render(); };
    window.updateItem = (t, i, fld, val) => { 
        let finalVal = (fld === 'f') ? parseEng(val) : (fld === 'q' ? parseFloat(val) : val);
        sys[t+'s'][i][fld] = finalVal; 
        render(); syncUI(); 
    };
    window.updateSys = () => { sys.dc = parseEng(document.getElementById('dc-gain').value); render(); };

    function setupEvents() {
        let dragItem = null;
        mCanvas.onmousedown = (e) => {
            const r = mCanvas.getBoundingClientRect();
            const mx = (e.clientX - r.left), my = (e.clientY - r.top);
            const mRange = { min: parseFloat(document.getElementById('mag-min').value), max: parseFloat(document.getElementById('mag-max').value) };
            [...sys.poles.map((p,i)=>({p,i,t:'pole'})), ...sys.zeros.map((z,i)=>({p:z,i,t:'zero'}))].forEach(o => {
                const ix = freqToX(o.p.f, r.width), iy = valToY(getResp(o.p.f).m, mRange.min, mRange.max, r.height);
                if (Math.hypot(mx-ix, my-iy) < 25) dragItem = o;
            });
        };
        window.onmousemove = (e) => {
            if (!dragItem) return;
            const r = mCanvas.getBoundingClientRect();
            let x = Math.max(PAD.l, Math.min(e.clientX - r.left, r.width - PAD.r));
            dragItem.p.f = xToFreq(x, r.width);
            render(); syncUI();
        };
        window.onmouseup = () => dragItem = null;
    }

    init();
</script>
</body>
</html>
